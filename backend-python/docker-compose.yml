services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: storyflow
      POSTGRES_PASSWORD: storyflow
      POSTGRES_DB: storyflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyflow -d storyflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://storyflow:storyflow@db:5432/storyflow
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
